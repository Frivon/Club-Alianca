<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Club Aliança</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #000000, #111827);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-gray-900 border border-orange-500/20 rounded-3xl shadow-2xl p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 mx-auto mb-4 bg-orange-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/40">
        <span class="text-black text-3xl font-bold">CA</span>
      </div>

      <h1 class="text-3xl font-bold text-orange-500">Club Aliança</h1>
      <p class="text-gray-400 mt-2">Cadastre-se e aproveite ofertas exclusivas</p>
    </div>

    <!-- Form -->
    <form id="cadastroForm" class="space-y-4">

      <input type="text" id="nome" placeholder="Nome Completo"
        class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white">

      <input type="text" id="cpf" maxlength="14" placeholder="CPF"
        class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white">

      <input type="tel" id="telefone" placeholder="Telefone"
        class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white">

      <input type="email" id="email" placeholder="E-mail"
        class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white">

      <input type="password" id="senha" placeholder="Senha"
        class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white">

      <button type="submit"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl">
        Cadastrar
      </button>

    </form>

  </div>

  <!-- SUPABASE (tem que vir antes do script de uso) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://flsufquyizgxmytjklnt.supabase.co";
    const supabaseKey = "sb_publishable_Y0eTT0Cts2oSptp1rG3bNg_OodUVTvS";

    const client = supabase.createClient(supabaseUrl, supabaseKey);

    // CPF máscara
    document.getElementById('cpf').addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d)/, '$1.$2');
      v = v.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
      e.target.value = v;
    });

    // Telefone máscara
    document.getElementById('telefone').addEventListener('input', (e) => {
      let v = e.target.value.replace(/\D/g, '');
      v = v.replace(/^(\d{2})(\d)/g, '($1) $2');
      v = v.replace(/(\d)(\d{4})$/, '$1-$2');
      e.target.value = v;
    });

    // Submit correto
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nome = document.getElementById('nome').value;
      const cpf = document.getElementById('cpf').value;
      const telefone = document.getElementById('telefone').value;
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;

      const { data, error } = await client
        .from('clientes')
        .insert([
          { nome, cpf, telefone, email, senha }
        ]);

      console.log("DATA:", data);
      console.log("ERROR:", error);

      if (error) {
        alert("Erro: " + error.message);
        return;
      }

      alert("Cadastro realizado com sucesso!");

      document.getElementById('cadastroForm').reset();
    });

  </script>

</body>
</html>
