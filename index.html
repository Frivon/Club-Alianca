<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Club Aliança</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #000000, #111827);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-gray-900 border border-orange-500/20 rounded-3xl shadow-2xl p-8">

    <!-- Logo / Título -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 mx-auto mb-4 bg-orange-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/40">
        <span class="text-black text-3xl font-bold">CA</span>
      </div>

      <h1 class="text-3xl font-bold text-orange-500">
        Club Aliança
      </h1>

      <p class="text-gray-400 mt-2">
        Cadastre-se e aproveite ofertas exclusivas
      </p>
    </div>

    <!-- Formulário -->
    <form id="cadastroForm" class="space-y-4">

      <!-- Nome -->
      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">
          Nome Completo
        </label>

        <input
          type="text"
          id="nome"
          required
          placeholder="Digite seu nome"
          class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
      </div>

      <!-- CPF -->
      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">
          CPF
        </label>

        <input
          type="text"
          id="cpf"
          maxlength="14"
          required
          placeholder="000.000.000-00"
          class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
      </div>

      <!-- Telefone -->
      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">
          Telefone
        </label>

        <input
          type="tel"
          id="telefone"
          required
          placeholder="(00) 00000-0000"
          class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">
          E-mail
        </label>

        <input
          type="email"
          id="email"
          placeholder="seuemail@gmail.com"
          class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
      </div>

      <!-- Senha -->
      <div>
        <label class="block text-sm font-medium text-gray-200 mb-1">
          Senha
        </label>

        <input
          type="password"
          id="senha"
          required
          placeholder="Crie uma senha"
          class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white placeholder-gray-500 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition">
      </div>

      <!-- Botão -->
      <button
        type="submit"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl transition duration-300 shadow-lg shadow-orange-500/30">
        Cadastrar
      </button>

    </form>

    <!-- Login -->
    <p class="text-center text-sm text-gray-400 mt-6">
      Já possui cadastro?
      <a
        href="login.html"
        class="text-orange-500 hover:text-orange-400 font-semibold">
        Entrar
      </a>
    </p>

  </div>

  <script>

    // Máscara CPF
    document.getElementById('cpf').addEventListener('input', function(e) {
      let value = e.target.value.replace(/\D/g, '');

      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d)/, '$1.$2');
      value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

      e.target.value = value;
    });

    // Máscara Telefone
    document.getElementById('telefone').addEventListener('input', function(e) {

      let value = e.target.value.replace(/\D/g, '');

      if (value.length > 11) {
        value = value.slice(0, 11);
      }

      value = value.replace(/^(\d{2})(\d)/g, '($1) $2');
      value = value.replace(/(\d)(\d{4})$/, '$1-$2');

      e.target.value = value;
    });

    // Cadastro
    document.getElementById('cadastroForm').addEventListener('submit', async (e) => {

      e.preventDefault();

      const cliente = {
        nome: document.getElementById('nome').value,
        cpf: document.getElementById('cpf').value,
        telefone: document.getElementById('telefone').value,
        email: document.getElementById('email').value,
        senha: document.getElementById('senha').value
      };

      console.log(cliente);

      alert('Cadastro realizado com sucesso!');

      // Integração Supabase será adicionada aqui

    });

  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</body>
</html>
