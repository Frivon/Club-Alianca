<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Club Aliança</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #000000, #111827);
    }
  </style>
</head>

<body class="min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md bg-gray-900 border border-orange-500/20 rounded-3xl shadow-2xl p-8">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-20 h-20 mx-auto mb-4 bg-orange-500 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/40">
        <span class="text-black text-3xl font-bold">CA</span>
      </div>

      <h1 class="text-3xl font-bold text-orange-500">Club Aliança</h1>
      <p class="text-gray-400 mt-2">Acesse sua conta</p>
    </div>

    <!-- Form -->
    <form id="loginForm" class="space-y-4">

      <input type="text" id="cpf" placeholder="CPF"
        class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white">

      <input type="password" id="senha" placeholder="Senha"
        class="w-full p-3 rounded-xl bg-gray-800 border border-gray-700 text-white">

      <button type="submit"
        class="w-full bg-orange-500 hover:bg-orange-600 text-white font-semibold py-3 rounded-xl">
        Entrar
      </button>

    </form>

    <p class="text-center text-sm text-gray-400 mt-6">
      Não tem conta?
      <a href="index.html" class="text-orange-500 hover:text-orange-400 font-semibold">
        Cadastre-se
      </a>
    </p>

  </div>

  <!-- SUPABASE -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const supabaseUrl = "https://flsufquyizgxmytjklnt.supabase.co";
    const supabaseKey = "SUA_PUBLISHABLE_KEY_AQUI";

    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const cpf = document.getElementById('cpf').value;
      const senha = document.getElementById('senha').value;

      const { data, error } = await supabase
        .from('clientes')
        .select('*')
        .eq('cpf', cpf)
        .eq('senha', senha)
        .single();

      if (error || !data) {
        alert("CPF ou senha inválidos!");
        return;
      }

      // salvar usuário logado (simples)
      localStorage.setItem("cliente", JSON.stringify(data));

      alert("Login realizado com sucesso!");

      window.location.href = "painel.html";
    });

  </script>

</body>
</html>
